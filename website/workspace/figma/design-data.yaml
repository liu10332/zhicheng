                            textStyle: style_YXXQ39
                            fills: fill_B6IO5A
                          - id: 98:1163
                            name: 智成时空是由上市企业超图软件2022年投资成立的科技研发型企业，专业致力于时空数据治理与智能化应用领域的技术研发与应用推广。公司高度重视时空治理领域核心技术研发投入，截至目前研发成果已取得60余项知识产权，在众多核心技术的加持下公司实现了快速发展，三年时间就发展成为技术服务规上企业、高新技术企业、专精特新中小企业，同时也被陕西股权交易所审核遴选进入上市后备企业库。 公司研发的成果已应用于自然资源部地理底图“一张图”等行业领域重大工程项目中，服务客户遍及部委、北京、陕西、山西、江苏、青海等多个省份，助力赋能了水利、交通等国家十余个行业领域用户的数字化转型发展。
                            type: TEXT
